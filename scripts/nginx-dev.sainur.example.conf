# dev.sainur.uz uchun SPA + statik fayllar.
# Xato: "Expected JavaScript but got text/html" — /assets/*.js uchun fayl yo'q yoki
# root boshqa papka. Yechim 1: root to'g'rilang. Yechim 2: loyihadagi
# deploy-dev-frontend.ps1 — single-file index.html (alohida /assets kerak emas).

server {
    listen 443 ssl http2;
    server_name dev.sainur.uz;

    root /var/www/nizamov/dist-dev;
    index index.html;

    # Agar alohida asset build ishlatsangiz — statikni aniq diskdan olish:
    location /assets/ {
        alias /var/www/nizamov/dist-dev/assets/;
        try_files $uri =404;
        default_type "";
        types {
            application/javascript js mjs;
            text/css css;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSL sertifikat yo'llaringizni qo'shing (certbot va hokazo)
}
